# SFTP Connection Settings
sftp:
  host: "192.168.1.100"
  port: 22
  username: "your_username"
  password: "your_password"
  base_path: "/mnt/sftp"
  timeout: 60          # TCP connect timeout (seconds)
  banner_timeout: 60   # SSH banner read timeout (seconds)
  auth_timeout: 60     # SSH auth timeout (seconds)

# Local Path Settings
paths:
  archive: "archive/"
  untar: "untar/"
  temp: "tmp/"
  log: "logs/"

# Concurrency Settings
concurrent: 40          # download/preprocess worker count
discovery_concurrent: 16  # SFTP connections used during file discovery
                          # keep this lower than concurrent to avoid SSH banner errors

# Keyword list file path
keyword_list_file: "keyword_list.txt"
