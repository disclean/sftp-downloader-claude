# SFTP Connection Settings
sftp:
  host: "192.168.1.100"
  port: 22
  username: "your_username"
  password: "your_password"
  base_path: "/mnt/sftp"

# Local Path Settings
paths:
  archive: "archive/"
  untar: "untar/"
  temp: "tmp/"
  log: "logs/"

# Concurrency Settings
concurrent: 4

# Keyword list file path
keyword_list_file: "keyword_list.txt"
